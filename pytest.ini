[pytest]
testpaths = tests
addopts = -v --tb=short
# Collect only the Phase 2.4 foundation test files
collect_ignore_glob =
    tests/test_routing.py
    tests/test_batch4_target_fail_closed.py
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services (Redis, LLM APIs)
    unit: marks pure unit tests with no I/O
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
